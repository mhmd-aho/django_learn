<!DOCTYPE html>
<html>
<head>
    <title>Registration</title>
</head>
<body>
    <h1>Register</h1>
    
    <!-- We need a form tag to wrap our Django form -->
    <form method="POST">
        <!-- Always include a CSRF token when making POST requests -->
        {% csrf_token %}
        
        <!-- Render the form as paragraph tags -->
        {{ form.as_p }}
        
        <button type="submit">Submit</button>
    </form>
</body>
</html>
