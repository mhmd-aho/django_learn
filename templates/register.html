{% extends 'base.html' %}
       {% block content %}
        <h1>Register</h1>
        
        <!-- We need a form tag to wrap our Django form -->
        <form method="POST">
            <!-- Always include a CSRF token when making POST requests -->
            {% csrf_token %}
            
            <!-- Render the form as paragraph tags -->
            {{ form.as_p }}
            
            <button type="submit">Submit</button>
        </form>
        {% endblock %}
